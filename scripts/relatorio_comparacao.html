<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Comparação de JSONs</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background: #1a1a2e; color: #eee; }
        h1, h2, h3 { color: #00d9ff; }
        .stats { background: #16213e; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .stat { display: inline-block; margin: 10px 20px; text-align: center; }
        .stat-value { font-size: 2em; font-weight: bold; color: #00d9ff; }
        .stat-label { color: #888; }
        .diff { background: #1f1f3a; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 4px solid #ff6b6b; }
        .diff-type { color: #ff6b6b; font-weight: bold; }
        .diff-slug { color: #4ecdc4; }
        .diff-original { background: #2d2d44; padding: 10px; margin: 5px 0; border-radius: 4px; }
        .diff-importado { background: #2d442d; padding: 10px; margin: 5px 0; border-radius: 4px; }
        .success { color: #4ecdc4; }
        .error { color: #ff6b6b; }
        .filter-bar { background: #16213e; padding: 15px; border-radius: 8px; margin: 20px 0; }
        input, select { padding: 8px; border-radius: 4px; border: none; margin: 5px; }
        .collapse-btn { cursor: pointer; color: #00d9ff; }
    </style>
</head>
<body>
    <h1>🔍 Comparação de JSONs - Legislação</h1>

    <div class="stats">
        <div class="stat">
            <div class="stat-value">0</div>
            <div class="stat-label">Slugs em comum</div>
        </div>
        <div class="stat">
            <div class="stat-value error">0</div>
            <div class="stat-label">Apenas no original</div>
        </div>
        <div class="stat">
            <div class="stat-value error">0</div>
            <div class="stat-label">Apenas no importado</div>
        </div>
        <div class="stat">
            <div class="stat-value error">0</div>
            <div class="stat-label">Blocos diferentes</div>
        </div>
        <div class="stat">
            <div class="stat-value success">0</div>
            <div class="stat-label">Total diferenças</div>
        </div>
    </div>

    <h2>✅ ARQUIVOS IDÊNTICOS!</h2>

    <div class="filter-bar">
        <input type="text" id="filter" placeholder="Filtrar por slug..." onkeyup="filterDiffs()">
        <select id="typeFilter" onchange="filterDiffs()">
            <option value="">Todos os tipos</option>
            <option value="slug_faltando_importado">Faltando no importado</option>
            <option value="slug_novo_importado">Novo no importado</option>
            <option value="campo_diferente">Campo diferente</option>
            <option value="children_quantidade_diferente">Children diferentes</option>
        </select>
    </div>

    <div id="diffs">

    </div>

    <script>
        function filterDiffs() {
            const text = document.getElementById('filter').value.toLowerCase();
            const type = document.getElementById('typeFilter').value;
            const diffs = document.querySelectorAll('.diff');

            diffs.forEach(diff => {
                const slug = diff.dataset.slug.toLowerCase();
                const diffType = diff.dataset.type;

                const matchText = !text || slug.includes(text);
                const matchType = !type || diffType === type;

                diff.style.display = matchText && matchType ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
